version: '3.8'

services:
  amoora-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - JWT_SECRET=${JWT_SECRET}
    container_name: amoora-inventory-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./logs:/var/log/amoora
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      timeout: 10s
      retries: 3
      start_period: 30s
      interval: 30s
    networks:
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.amoora.rule=Host(`amoora.radenalam.com`)
      - traefik.http.routers.amoora.entrypoints=web
      - traefik.http.services.amoora.loadbalancer.server.port=3001

networks:
  traefik_proxy:
    external: true
