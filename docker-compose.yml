services:
  amoora-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amoora-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./public:/app/public
    networks:
      - traefik_proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3006"]
      timeout: 10s
      retries: 5
      start_period: 30s
      interval: 15s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.amoora.rule=Host(`amoora.radenalam.com`)
      - traefik.http.routers.amoora.entrypoints=web
      - traefik.http.services.amoora.loadbalancer.server.port=3006

networks:
  traefik_proxy:
    external: true
